<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elias Range Stays — Platform Ecosystem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Source+Serif+4:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#080B10;overflow:hidden;user-select:none;font-family:'IBM Plex Mono',monospace}
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:linear-gradient(180deg,rgba(8,11,16,.98),rgba(8,11,16,.6));border-bottom:1px solid rgba(27,67,83,.4)}
#hdr h1{font-family:'League Spartan',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:.04em}
#hdr .tag{font-family:'Source Serif 4',serif;font-style:italic;font-size:11px;color:#4F87A0;margin-top:2px}
#hdr .meta{font-size:9px;color:rgba(255,255,255,.22);letter-spacing:.15em;text-transform:uppercase;text-align:right}
#wrap{position:fixed;inset:0;overflow:hidden;cursor:grab}
#wrap.drag{cursor:grabbing}
#svg-root{position:absolute;transform-origin:0 0}
/* Popup */
#panel{position:fixed;top:60px;right:-360px;width:340px;bottom:20px;z-index:200;transition:right .3s ease;background:rgba(8,11,16,.97);border:1px solid rgba(79,135,160,.3);border-radius:14px 0 0 14px;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;box-shadow:-8px 0 40px rgba(0,0,0,.5)}
#panel.open{right:0}
#panel-icon{font-size:32px;line-height:1}
#panel-name{font-family:'League Spartan',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-top:4px}
#panel-sector{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#4F87A0;margin-top:2px}
#panel hr{border:none;border-top:1px solid rgba(255,255,255,.07)}
#panel-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35)}
#panel-list{display:flex;flex-direction:column;gap:6px;list-style:none}
#panel-list li{font-size:12px;color:rgba(255,255,255,.7);padding:7px 10px 7px 14px;background:rgba(255,255,255,.04);border-radius:6px;position:relative;border-left:2px solid rgba(79,135,160,.4);line-height:1.4}
#panel-close{position:absolute;top:12px;right:14px;background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:18px}
#panel-close:hover{color:#fff}
/* Controls */
#ctrl{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:5px}
.cbtn{width:34px;height:34px;border-radius:8px;border:1px solid rgba(79,135,160,.3);background:rgba(8,11,16,.85);color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.cbtn:hover{background:rgba(27,67,83,.5)}
#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.15);letter-spacing:.18em;text-transform:uppercase;pointer-events:none;z-index:99}
/* SVG segment interactions */
.seg{cursor:pointer;transition:opacity .15s}
.seg:hover{opacity:.85}
.seg-r3{cursor:pointer}
.seg-r3:hover .r3-arc{opacity:.9}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <h1>Elias Range Stays</h1>
    <div class="tag">Platform Ecosystem · Clarity Roadmap</div>
  </div>
  <div class="meta">British Columbia · Canada<br>Healthcare &amp; Workforce Housing</div>
</div>

<div id="wrap">
  <svg id="svg-root" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-icon"></div>
  <div id="panel-name"></div>
  <div id="panel-sector"></div>
  <hr>
  <div id="panel-label">Contents</div>
  <ul id="panel-list"></ul>
</div>

<div id="ctrl">
  <button class="cbtn" onclick="doZoom(1.2)">+</button>
  <button class="cbtn" onclick="doZoom(0.82)">−</button>
  <button class="cbtn" onclick="resetView()" style="font-size:11px">⌂</button>
</div>
<div id="hint">Scroll to zoom · Drag to pan · Click any segment for detail</div>

<script>
const toRad = d => d * Math.PI / 180;
const CX = 900, CY = 900;
// Ring radii: [center-inner, ring1-outer, ring2-outer, ring3-outer]
const RI = [0, 110, 250, 430, 620];
const SGAP = 3;   // sector gap degrees
const NGAP = 1.2; // sub-item gap degrees

// ─── DATA ────────────────────────────────────────────────────────────────────
const SECTORS = [
  {
    id:'infra', name:'Infrastructure', icon:'⚙️',
    sa:-90, ea:0,
    c1:'#0d2535', c2:'#1B4353', c3:'#2A6680', cText:'#A8D1E7',
    stroke:'#4F87A0',
    subs:[
      { name:'Contract Infrastructure', icon:'📋', desc:'End-to-end contract & quote management',
        items:['ContractFlow App','Quote Engine & Approval Flow','AI Contract Generation (Claude)','DocuSeal E-Signature Integration','Client Portal & Token Links','Contract Numbering (CF-000001)','Role-Based Access (Owner / Staff)'] },
      { name:'Digital Infrastructure', icon:'💻', desc:'Technology stack & hosting',
        items:['eliasrangestays.ca (React/Vite/Vercel)','ContractFlow (Next.js/Vercel)','GitHub — Aneill17 Repos','Supabase Database & Auth','Resend Email (contracts@team.eliasrangestays.ca)','AI Bot Team Infrastructure','Monday.com Project Management'] },
      { name:'Physical Infrastructure', icon:'🏗️', desc:'Owned and managed physical assets',
        items:['34+ Units Managed Across BC','Healthcare Housing Hubs (HHHubs)','Greenhouses — On-Site Food Production','Green Rooftop Patios & Community Spaces','Damage Deposit & Lease Registry','Unit P&L Tracking','Maintenance & Upkeep Systems'] },
      { name:'Program Infrastructure', icon:'🔧', desc:'Operational systems & processes',
        items:['AP/AR Dashboard (Landlord & Client)','Financial Dashboard (Owner-Only)','KPI Intelligence Layer (V2)','Ops Team Structure (Austin / Braden / Sheila)','Lease Registry & Alerts','Pipeline View & Revenue Forecasting','Docuseal Webhook & Status Sync'] },
    ]
  },
  {
    id:'services', name:'Services', icon:'🏠',
    sa:0, ea:90,
    c1:'#0d2018', c2:'#2D5A3D', c3:'#3D7A52', cText:'#8FD4A0',
    stroke:'#6DC88A',
    subs:[
      { name:'Workforce Housing', icon:'🏥', desc:'Core product — healthcare & construction workers',
        items:['$105/night · 40% Below Hotel Average','34+ Units Across BC','6 Hospitals Currently Served','24/7 Guest Support','Single Invoice Model Per Client','5-Minute Proximity to Work Sites','BC-Wide Coverage'] },
      { name:'Healthcare Housing Hubs', icon:'🌿', desc:'Full-service community housing complexes',
        items:['Practitioner Office Spaces','Adjacent Healthcare Service Leases','Greenhouses & Urban Agriculture','Green Rooftop Patios','Community & Wellness Spaces','Built-In Transportation Access','Full Green Infrastructure Wrap'] },
      { name:'Investment & Development', icon:'📈', desc:'Fund, development & advisory services',
        items:['Small Multifamily HC Investment Fund','Equity Development Platform','Multi-Health-Authority Build Contracts','Consulting Package (Full Advisory)','Draw / Dry Close Program','Cross-Regional Delivery Capability','Investor Relations & Reporting'] },
      { name:'Additional Services', icon:'✨', desc:'Expanding service ecosystem',
        items:['Transportation Services','Elias Adventures (Outdoor Experiences)','Independent Staff Housing (ERS-Owned)','Community Leasing Platform','HC Housing E-book & Downloads','Partnership Documents','Work With Us Program'] },
    ]
  },
  {
    id:'community', name:'Community', icon:'🤝',
    sa:90, ea:180,
    c1:'#2a1f08', c2:'#8B6520', c3:'#C9A84C', cText:'#F0D080',
    stroke:'#E0BC6A',
    subs:[
      { name:'Mastermind Network', icon:'🧠', desc:'Leaders solving Canada\'s healthcare housing crisis',
        items:['Adjacent Partners & Collaborators','Healthcare System Leaders','Infrastructure & Development Experts','HC Problem Solvers & Innovators','BC Health Authority Connections','National HC Housing Network','Peer Collaboration & Support'] },
      { name:'Healthcare Community', icon:'👩‍⚕️', desc:'Professionals living and working with ERS',
        items:['Current ERS Residents','Future / Incoming Residents','Local Communities ERS Operates In','Healthcare Professional Networks','Staff Wellness & Quality of Life','Sense of Belonging & Support','Community Identity Building'] },
      { name:'Community Programming', icon:'🎉', desc:'Events, wellness & local engagement',
        items:['Local Community Events','Wellness & Fitness Programming','Regional Partnership Activities','Cultural Engagement Initiatives','Adventure & Outdoor Programs','Volunteer & Community Service','Newsletter & Blog Community'] },
    ]
  },
  {
    id:'media', name:'Media', icon:'📢',
    sa:180, ea:270,
    c1:'#0d1e2a', c2:'#1a3f55', c3:'#4F87A0', cText:'#C8E8F4',
    stroke:'#A8D1E7',
    subs:[
      { name:'Client Communications', icon:'📨', desc:'B2B comms with health authorities & companies',
        items:['Quote Delivery Emails (Resend)','Contract & Agreement Notifications','DocuSeal E-Signature Flow','Invoice Generation & Delivery','Status Update Notifications','24hr Quote Turnaround SLA','Procurement-Ready Documentation'] },
      { name:'Guest Communications', icon:'🏡', desc:'Direct resident & healthcare worker comms',
        items:['Welcome & Onboarding Messaging','24/7 Guest Support Line','Housing Update Notifications','Community Event Alerts','Check-In / Check-Out Process','Maintenance Request Flow','Quality of Life Check-Ins'] },
      { name:'Social Media', icon:'📱', desc:'Brand-building across key channels',
        items:['LinkedIn — Austin Neill (Personal)','LinkedIn — Elias Range Stays (Business)','Facebook — ERS Business Page','TikTok — ERS Brand Channel','Content Calendar & Scheduling','Brand Voice & Tone Guidelines','Engagement & Community Building'] },
      { name:'Content Platform', icon:'✍️', desc:'Thought leadership & lead generation',
        items:['Blog (Community Updates & News)','Newsletter (Partners & HC Leaders)','Webinar Series (Industry Experts)','Healthcare Housing E-book','Partnership Documents','Work With Us Downloads','Downloadable Resources Hub'] },
    ]
  },
];

// ─── SVG PATH HELPERS ─────────────────────────────────────────────────────────
function arc(cx,cy,r1,r2,a1,a2){
  const x1i=cx+r1*Math.cos(toRad(a1)), y1i=cy+r1*Math.sin(toRad(a1));
  const x1o=cx+r2*Math.cos(toRad(a1)), y1o=cy+r2*Math.sin(toRad(a1));
  const x2o=cx+r2*Math.cos(toRad(a2)), y2o=cy+r2*Math.sin(toRad(a2));
  const x2i=cx+r1*Math.cos(toRad(a2)), y2i=cy+r1*Math.sin(toRad(a2));
  const lg=(a2-a1)>180?1:0;
  return `M${x1o} ${y1o} A${r2} ${r2} 0 ${lg} 1 ${x2o} ${y2o} L${x2i} ${y2i} A${r1} ${r1} 0 ${lg} 0 ${x1i} ${y1i}Z`;
}
function centroid(cx,cy,r1,r2,a1,a2){
  const ma=(a1+a2)/2, mr=(r1+r2)/2;
  return {x:cx+mr*Math.cos(toRad(ma)), y:cy+mr*Math.sin(toRad(ma)), a:ma};
}
function makeText(svg,x,y,angle,text,size,color,weight,anchor='middle'){
  let rot=angle; if(rot>90&&rot<270)rot+=180; if(rot<-90||rot>270)rot+=0;
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x); t.setAttribute('y',y);
  t.setAttribute('text-anchor',anchor);
  t.setAttribute('dominant-baseline','central');
  t.setAttribute('font-size',size);
  t.setAttribute('font-family',"'League Spartan',sans-serif");
  t.setAttribute('font-weight',weight||'600');
  t.setAttribute('fill',color);
  t.setAttribute('pointer-events','none');
  t.setAttribute('transform',`rotate(${rot},${x},${y})`);
  t.textContent=text;
  svg.appendChild(t);
  return t;
}
function mkPath(svg,d,fill,stroke,sw,opacity){
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);
  p.setAttribute('fill',fill||'none');
  if(stroke){p.setAttribute('stroke',stroke);p.setAttribute('stroke-width',sw||1);}
  if(opacity!==undefined)p.setAttribute('opacity',opacity);
  svg.appendChild(p);
  return p;
}

// ─── BUILD ────────────────────────────────────────────────────────────────────
const svg = document.getElementById('svg-root');
svg.setAttribute('width','1800'); svg.setAttribute('height','1800');
svg.setAttribute('viewBox','0 0 1800 1800');

// Topo bg
const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
defs.innerHTML=`
<radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
  <stop offset="0%" stop-color="#0e1620" stop-opacity="1"/>
  <stop offset="100%" stop-color="#080B10" stop-opacity="1"/>
</radialGradient>
<filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="glow2"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
`;
svg.appendChild(defs);
const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
bg.setAttribute('width','1800');bg.setAttribute('height','1800');bg.setAttribute('fill','url(#bgGrad)');
svg.appendChild(bg);

// Topo rings
for(let r=200;r<=1600;r+=80){
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',CX);c.setAttribute('cy',CY);c.setAttribute('r',r);
  c.setAttribute('fill','none');c.setAttribute('stroke','#1B4353');c.setAttribute('stroke-width','0.4');c.setAttribute('opacity','0.12');
  svg.appendChild(c);
}

// Separator lines (between sectors)
[-90,0,90,180].forEach(a=>{
  const lx=CX+640*Math.cos(toRad(a)), ly=CY+640*Math.sin(toRad(a));
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',CX);l.setAttribute('y1',CY);
  l.setAttribute('x2',lx);l.setAttribute('y2',ly);
  l.setAttribute('stroke','rgba(255,255,255,0.06)');l.setAttribute('stroke-width','1');
  svg.appendChild(l);
});

// ── Ring 1, 2, 3 ──
SECTORS.forEach(sec=>{
  const sa=sec.sa+SGAP/2, ea=sec.ea-SGAP/2;
  const nSubs=sec.subs.length;
  const subSpan=(ea-sa)/nSubs;

  // Ring 1 — sector arc
  const g1=document.createElementNS('http://www.w3.org/2000/svg','g');
  g1.setAttribute('class','seg');
  g1.style.cursor='pointer';
  const p1=mkPath(g1, arc(CX,CY,RI[1],RI[2],sa,ea), sec.c2, sec.stroke, 1, 1);
  // glow version behind
  const p1g=mkPath(svg, arc(CX,CY,RI[1]+4,RI[2]-4,sa+0.5,ea-0.5), sec.c3, 'none',0,0.25);
  p1g.setAttribute('filter','url(#glow)');
  svg.appendChild(g1);

  // Ring 1 label
  const c1=centroid(CX,CY,RI[1],RI[2],sa,ea);
  // Icon
  const icon=document.createElementNS('http://www.w3.org/2000/svg','text');
  icon.setAttribute('x',c1.x);icon.setAttribute('y',c1.y-16);
  icon.setAttribute('text-anchor','middle');icon.setAttribute('dominant-baseline','central');
  icon.setAttribute('font-size','24');icon.setAttribute('pointer-events','none');
  icon.setAttribute('transform',`rotate(${c1.a>90&&c1.a<270?c1.a+180:c1.a},${c1.x},${c1.y-16})`);
  icon.textContent=sec.icon; g1.appendChild(icon);
  makeText(g1,c1.x,c1.y+12,c1.a,sec.name,15,sec.cText,'800');

  g1.addEventListener('click',e=>{e.stopPropagation();openPanel(sec.icon,sec.name,'Full Platform Sector',sec.subs.map(s=>s.name+' — '+s.desc));});
  g1.addEventListener('mouseenter',()=>p1.setAttribute('fill',sec.c3));
  g1.addEventListener('mouseleave',()=>p1.setAttribute('fill',sec.c2));

  // Ring 2 + 3
  sec.subs.forEach((sub,si)=>{
    const s2a=sa+si*subSpan+NGAP/2;
    const e2a=sa+(si+1)*subSpan-NGAP/2;

    // Ring 2 arc
    const g2=document.createElementNS('http://www.w3.org/2000/svg','g');
    g2.setAttribute('class','seg');
    const fillR2=sec.c1;
    const p2=mkPath(g2, arc(CX,CY,RI[2],RI[3],s2a,e2a), fillR2, sec.stroke, 0.6, 1);
    svg.appendChild(g2);

    // Ring 2 label
    const c2=centroid(CX,CY,RI[2],RI[3],s2a,e2a);
    // Split name into 2 lines
    const words=sub.name.split(' ');
    const mid=Math.ceil(words.length/2);
    const line1=words.slice(0,mid).join(' ');
    const line2=words.slice(mid).join(' ');
    const rotA=c2.a>90&&c2.a<270?c2.a+180:c2.a;
    const t2a=document.createElementNS('http://www.w3.org/2000/svg','text');
    t2a.setAttribute('x',c2.x);t2a.setAttribute('y',c2.y-(line2?7:0));
    t2a.setAttribute('text-anchor','middle');t2a.setAttribute('dominant-baseline','central');
    t2a.setAttribute('font-size','11');t2a.setAttribute('font-family',"'League Spartan',sans-serif");
    t2a.setAttribute('font-weight','700');t2a.setAttribute('fill',sec.cText);
    t2a.setAttribute('pointer-events','none');
    t2a.setAttribute('transform',`rotate(${rotA},${c2.x},${c2.y})`);
    t2a.textContent=line1; g2.appendChild(t2a);
    if(line2){
      const t2b=document.createElementNS('http://www.w3.org/2000/svg','text');
      t2b.setAttribute('x',c2.x);t2b.setAttribute('y',c2.y+9);
      t2b.setAttribute('text-anchor','middle');t2b.setAttribute('dominant-baseline','central');
      t2b.setAttribute('font-size','11');t2b.setAttribute('font-family',"'League Spartan',sans-serif");
      t2b.setAttribute('font-weight','700');t2b.setAttribute('fill',sec.cText);
      t2b.setAttribute('pointer-events','none');
      t2b.setAttribute('transform',`rotate(${rotA},${c2.x},${c2.y})`);
      t2b.textContent=line2; g2.appendChild(t2b);
    }

    g2.addEventListener('click',e=>{e.stopPropagation();openPanel(sub.icon,sub.name,sec.name,sub.items);});
    g2.addEventListener('mouseenter',()=>p2.setAttribute('fill',sec.c2));
    g2.addEventListener('mouseleave',()=>p2.setAttribute('fill',fillR2));

    // Ring 3 — individual items as thin arcs
    const nItems=sub.items.length;
    const itemSpan=(e2a-s2a)/nItems;
    sub.items.forEach((item,ii)=>{
      const i3a=s2a+ii*itemSpan+0.3;
      const e3a=s2a+(ii+1)*itemSpan-0.3;
      const g3=document.createElementNS('http://www.w3.org/2000/svg','g');
      g3.setAttribute('class','seg');
      // Alternating shade for visual rhythm
      const shade=ii%2===0?sec.c2:sec.c3;
      const p3=mkPath(g3, arc(CX,CY,RI[3],RI[4],i3a,e3a), shade+'88', sec.stroke, 0.5, 0.85);
      // Short label
      const c3=centroid(CX,CY,RI[3],RI[4],i3a,e3a);
      const rotA3=c3.a>90&&c3.a<270?c3.a+180:c3.a;
      // Truncate label to fit
      const label=item.length>18?item.slice(0,16)+'…':item;
      const t3=document.createElementNS('http://www.w3.org/2000/svg','text');
      t3.setAttribute('x',c3.x);t3.setAttribute('y',c3.y);
      t3.setAttribute('text-anchor','middle');t3.setAttribute('dominant-baseline','central');
      t3.setAttribute('font-size','9');t3.setAttribute('font-family',"'IBM Plex Mono',monospace");
      t3.setAttribute('font-weight','400');t3.setAttribute('fill','rgba(255,255,255,0.65)');
      t3.setAttribute('pointer-events','none');
      t3.setAttribute('transform',`rotate(${rotA3},${c3.x},${c3.y})`);
      t3.textContent=label; g3.appendChild(t3);
      svg.appendChild(g3);
      g3.addEventListener('click',e=>{e.stopPropagation();openPanel(sub.icon,item,sub.name+' · '+sec.name,[item,...sub.items.filter(x=>x!==item).map(x=>'Also: '+x)]);});
      g3.addEventListener('mouseenter',()=>{p3.setAttribute('fill',sec.c3);p3.setAttribute('opacity','1');});
      g3.addEventListener('mouseleave',()=>{p3.setAttribute('fill',shade+'88');p3.setAttribute('opacity','0.85');});
    });
  });
});

// ── Center circle ──
const cGrad=document.createElementNS('http://www.w3.org/2000/svg','radialGradient');
cGrad.setAttribute('id','cGrad');cGrad.setAttribute('cx','40%');cGrad.setAttribute('cy','38%');cGrad.setAttribute('r','60%');
cGrad.innerHTML=`<stop offset="0%" stop-color="#1a2e40"/><stop offset="100%" stop-color="#080B10"/>`;
defs.appendChild(cGrad);

const cCircle=document.createElementNS('http://www.w3.org/2000/svg','circle');
cCircle.setAttribute('cx',CX);cCircle.setAttribute('cy',CY);cCircle.setAttribute('r',RI[1]-2);
cCircle.setAttribute('fill','url(#cGrad)');
cCircle.setAttribute('stroke','#4F87A0');cCircle.setAttribute('stroke-width','1.5');
cCircle.setAttribute('filter','url(#glow2)');
svg.appendChild(cCircle);

// Center content
function cText(y,text,size,color,weight,family){
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',CX);t.setAttribute('y',y);t.setAttribute('text-anchor','middle');
  t.setAttribute('dominant-baseline','central');t.setAttribute('font-size',size);
  t.setAttribute('font-family',family||"'League Spartan',sans-serif");
  t.setAttribute('font-weight',weight||'700');t.setAttribute('fill',color);
  t.setAttribute('pointer-events','none');t.textContent=text;
  svg.appendChild(t);
}
cText(CY-30,'🏔️','28','#fff','400','serif');
cText(CY+2,'Elias Range','16','#ffffff','800');
cText(CY+20,'Stays','16','#ffffff','800');
cText(CY+38,'BC · Canada','8','rgba(168,209,231,0.55)','400',"'IBM Plex Mono',monospace");

// Outer ring label arc (sector names on outside)
SECTORS.forEach(sec=>{
  const sa=sec.sa+SGAP/2+2, ea=sec.ea-SGAP/2-2;
  const c=centroid(CX,CY,RI[4]+12,RI[4]+12,sa,ea);
  const rotA=c.a>90&&c.a<270?c.a+180:c.a;
  const tOut=document.createElementNS('http://www.w3.org/2000/svg','text');
  tOut.setAttribute('x',c.x);tOut.setAttribute('y',c.y);
  tOut.setAttribute('text-anchor','middle');tOut.setAttribute('dominant-baseline','central');
  tOut.setAttribute('font-size','11');tOut.setAttribute('font-family',"'IBM Plex Mono',monospace");
  tOut.setAttribute('font-weight','500');tOut.setAttribute('fill',sec.stroke);
  tOut.setAttribute('opacity','0.6');tOut.setAttribute('pointer-events','none');
  tOut.setAttribute('transform',`rotate(${rotA},${c.x},${c.y})`);
  tOut.setAttribute('letter-spacing','3');
  tOut.textContent=sec.name.toUpperCase();
  svg.appendChild(tOut);
});

// ─── PANEL ────────────────────────────────────────────────────────────────────
function openPanel(icon,name,sector,items){
  document.getElementById('panel-icon').textContent=icon;
  document.getElementById('panel-name').textContent=name;
  document.getElementById('panel-sector').textContent=sector;
  const ul=document.getElementById('panel-list');
  ul.innerHTML=items.map(i=>`<li>${i}</li>`).join('');
  document.getElementById('panel').classList.add('open');
}
function closePanel(){ document.getElementById('panel').classList.remove('open'); }
document.getElementById('wrap').addEventListener('click', closePanel);

// ─── PAN / ZOOM ───────────────────────────────────────────────────────────────
let tx=0,ty=0,sc=0.48,drag=false,ox=0,oy=0,stx=0,sty=0;
function apply(){ svg.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`; }
function resetView(){
  const vw=window.innerWidth,vh=window.innerHeight;
  sc=Math.min(vw,vh)/1100; tx=vw/2-CX*sc; ty=vh/2-CY*sc; apply();
}
function doZoom(f){
  const vw=window.innerWidth,vh=window.innerHeight;
  tx=vw/2-(vw/2-tx)*f; ty=vh/2-(vh/2-ty)*f; sc*=f; apply();
}
const wrap=document.getElementById('wrap');
wrap.addEventListener('mousedown',e=>{
  if(e.target.closest('.seg,.cbtn,#panel'))return;
  drag=true;wrap.classList.add('drag');ox=e.clientX;oy=e.clientY;stx=tx;sty=ty;
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;tx=stx+(e.clientX-ox);ty=sty+(e.clientY-oy);apply();
});
window.addEventListener('mouseup',()=>{drag=false;wrap.classList.remove('drag');});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.91;
  tx=e.clientX-(e.clientX-tx)*f; ty=e.clientY-(e.clientY-ty)*f; sc*=f; apply();
},{passive:false});
resetView();
</script>
